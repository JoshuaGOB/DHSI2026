services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    # lets the container reach Ollama on the host (set OLLAMA_BASE_URL to
    # http://host.docker.internal:11434 in .env); no-op on Docker Desktop
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - chroma

  chroma:
    image: chromadb/chroma:1.5.9
    volumes:
      - ./data/chroma:/data
