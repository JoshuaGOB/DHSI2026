<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlantic Press Archive</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --parchment:    #f5f0e8;
      --parchment-dk: #ede5d5;
      --border:       #c8b99a;
      --gold:         #8b6914;
      --pin-red:      #8b3a3a;
      --text-dk:      #3a2a1a;
      --text-mid:     #7a5c3a;
      --text-lt:      #a08060;
      --panel-bg:     #fff8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--parchment); }
    #map { position: absolute; inset: 0; z-index: 0; }
    .leaflet-control-attribution { font-family: sans-serif; font-size: 10px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    const map = L.map('map', { center: [18, -45], zoom: 3, zoomControl: true });

    L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
      {
        attribution:
          '&copy; <a href="https://carto.com/">CARTO</a> &copy; ' +
          '<a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 18,
      }
    ).addTo(map);
  </script>
</body>
</html>
